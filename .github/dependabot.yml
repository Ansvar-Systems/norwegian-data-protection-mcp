version: 2
updates:
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "08:00"
      timezone: "Europe/Oslo"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
    ignore:
      # Only patch/minor auto-updates; major versions require manual review
      - dependency-name: "*"
        update-types: ["version-update:semver-major"]

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "08:00"
      timezone: "Europe/Oslo"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
      - "github-actions"
